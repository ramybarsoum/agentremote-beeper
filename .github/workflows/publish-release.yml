name: Publish Release

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref }}

on:
  push:
    tags:
      - "v*"

env:
  GOTOOLCHAIN: local

jobs:
  build-binaries:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            goos: linux
            goarch: amd64
          - runs_on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runs_on: macos-15-intel
            goos: darwin
            goarch: amd64
          - runs_on: macos-14
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          version_no_v="${VERSION#v}"
          archive_name="agentremote_v${version_no_v}_${GOOS}_${GOARCH}.tar.gz"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          dist_dir="$RUNNER_TEMP/dist"
          stage_dir="$RUNNER_TEMP/package"

          mkdir -p "$dist_dir" "$stage_dir"

          go build \
            -tags goolm \
            -trimpath \
            -ldflags "-s -w -X main.Tag=${VERSION} -X main.Commit=${COMMIT} -X main.BuildTime=${build_time}" \
            -o "$stage_dir/agentremote" \
            ./cmd/agentremote

          cp LICENSE "$stage_dir/LICENSE"
          cp README.md "$stage_dir/README.md"

          tar -C "$stage_dir" -czf "$dist_dir/$archive_name" agentremote LICENSE README.md
          shasum -a 256 "$dist_dir/$archive_name" | awk -v name="$archive_name" '{ print $1 "  " name }' > "$dist_dir/$archive_name.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ runner.temp }}/dist/*.tar.gz
            ${{ runner.temp }}/dist/*.sha256
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-binaries

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Assemble checksums
        run: |
          set -euo pipefail
          cat dist/*.sha256 | sort -k2 > dist/checksums.txt
          rm -f dist/*.sha256
          ls -1 dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs:
      - publish-release

    steps:
      - name: Check tap token
        id: tap-token
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source repo
        if: ${{ steps.tap-token.outputs.present == 'true' }}
        uses: actions/checkout@v6

      - name: Download release artifacts
        if: ${{ steps.tap-token.outputs.present == 'true' }}
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Assemble checksums
        if: ${{ steps.tap-token.outputs.present == 'true' }}
        run: |
          set -euo pipefail
          cat dist/*.sha256 | sort -k2 > dist/checksums.txt

      - name: Checkout homebrew tap
        if: ${{ steps.tap-token.outputs.present == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: beeper/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update agentremote cask
        if: ${{ steps.tap-token.outputs.present == 'true' }}
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p homebrew-tap/Casks
          ./tools/generate-homebrew-cask.sh "$VERSION" dist/checksums.txt > homebrew-tap/Casks/agentremote.rb

      - name: Commit cask update
        if: ${{ steps.tap-token.outputs.present == 'true' }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          if git diff --quiet -- Casks/agentremote.rb; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/agentremote.rb
          git commit -m "Update agentremote cask for ${{ github.ref_name }}"
          git push
